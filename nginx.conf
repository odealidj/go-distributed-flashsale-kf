events {
    worker_connections 1024;
}

http {
    # Konfigurasi Rate Limiting: 10 requests per second per IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    upstream api_gateway {
        # Pertama, coba arahkan ke container api-gateway di port internal network
        server api-gateway:8000 max_fails=3 fail_timeout=5s;
        # Fallback ke debugger host OS (laptop) jika container api-gateway sedang mati/di-debug
        server host.docker.internal:18000 backup;
        # Pertahankan koneksi TCP tetap terbuka ke API Gateway (connection reuse)
        keepalive 100;
    }

    server {
        listen 80;

        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            limit_req_status 429;

            proxy_pass http://api_gateway;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
