openapi: 3.0.3
info:
  title: Mini Toko Bangunan REST API
  version: 1.0.0
  description: Kontrak REST yang menghadap frontend untuk demo microservices.
servers:
  - url: http://localhost:8080
    description: Base URL local API gateway atau order-service
paths:
  /orders:
    post:
      summary: Membuat order dan memulai checkout saga
      operationId: createOrder
      tags:
        - Orders
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderRequest'
      responses:
        '201':
          description: Order dibuat
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '502':
          $ref: '#/components/responses/BadGateway'
        '500':
          $ref: '#/components/responses/InternalError'
    get:
      summary: Menampilkan daftar order
      operationId: listOrders
      tags:
        - Orders
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
        - $ref: '#/components/parameters/OrderSort'
        - name: status
          in: query
          required: false
          description: Filter order berdasarkan status.
          schema:
            $ref: '#/components/schemas/OrderStatus'
      responses:
        '200':
          description: Daftar order
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'
  /orders/{order_id}:
    get:
      summary: Mengambil detail order
      operationId: getOrder
      tags:
        - Orders
      parameters:
        - $ref: '#/components/parameters/OrderId'
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: Detail order
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
  /orders/{order_id}/cancel:
    post:
      summary: Membatalkan order
      operationId: cancelOrder
      tags:
        - Orders
      parameters:
        - $ref: '#/components/parameters/OrderId'
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: Pembatalan order diterima
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalError'
  /products:
    get:
      summary: Menampilkan daftar product bahan bangunan aktif
      operationId: listProducts
      tags:
        - Products
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
        - $ref: '#/components/parameters/ProductSort'
        - name: category
          in: query
          required: false
          description: Filter product berdasarkan category slug atau ID.
          schema:
            type: string
        - name: search
          in: query
          required: false
          description: Pencarian product name secara case-insensitive.
          schema:
            type: string
            minLength: 1
      responses:
        '200':
          description: Daftar product
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'
  /products/{product_id}:
    get:
      summary: Mengambil detail product
      operationId: getProduct
      tags:
        - Products
      parameters:
        - $ref: '#/components/parameters/ProductId'
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: Detail product
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
components:
  parameters:
    CorrelationId:
      name: X-Correlation-Id
      in: header
      required: false
      schema:
        type: string
    Page:
      name: page
      in: query
      required: false
      description: Nomor page, dimulai dari 1.
      schema:
        type: integer
        minimum: 1
        default: 1
    PerPage:
      name: per_page
      in: query
      required: false
      description: Jumlah item per page. Value di atas 100 harus direject.
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    OrderSort:
      name: sort
      in: query
      required: false
      description: Sort expression. Value yang diizinkan adalah `created_at:desc`, `created_at:asc`, `total_amount:desc`, `total_amount:asc`.
      schema:
        type: string
        default: created_at:desc
    ProductSort:
      name: sort
      in: query
      required: false
      description: Sort expression. Value yang diizinkan adalah `name:asc`, `name:desc`, `price:asc`, `price:desc`.
      schema:
        type: string
        default: name:asc
    OrderId:
      name: order_id
      in: path
      required: true
      schema:
        type: string
    ProductId:
      name: product_id
      in: path
      required: true
      schema:
        type: string
  responses:
    BadRequest:
      description: Bad request atau validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource tidak ditemukan
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Business conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    BadGateway:
      description: Downstream service gagal dipanggil saat checkout
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    ResponseMeta:
      type: object
      required:
        - request_id
        - correlation_id
        - timestamp
      properties:
        request_id:
          type: string
        correlation_id:
          type: string
        timestamp:
          type: string
          format: date-time
    Pagination:
      type: object
      required:
        - page
        - per_page
        - total_items
        - total_pages
        - has_next
        - has_prev
      properties:
        page:
          type: integer
          minimum: 1
        per_page:
          type: integer
          minimum: 1
          maximum: 100
        total_items:
          type: integer
          minimum: 0
        total_pages:
          type: integer
          minimum: 0
        has_next:
          type: boolean
        has_prev:
          type: boolean
    FieldError:
      type: object
      required:
        - field
        - message
      properties:
        field:
          type: string
        message:
          type: string
    ErrorBody:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          example: VALIDATION_ERROR
        message:
          type: string
        details:
          type: object
          additionalProperties: true
        fields:
          type: array
          items:
            $ref: '#/components/schemas/FieldError'
    ErrorResponse:
      type: object
      required:
        - success
        - error
        - meta
      properties:
        success:
          type: boolean
          enum:
            - false
        error:
          $ref: '#/components/schemas/ErrorBody'
        meta:
          $ref: '#/components/schemas/ResponseMeta'
    CreateOrderRequest:
      type: object
      required:
        - customer
        - items
        - payment_mode
      properties:
        customer:
          $ref: '#/components/schemas/CustomerSnapshot'
        items:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/CreateOrderItem'
        payment_mode:
          type: string
          enum:
            - SUCCESS
            - FAILURE
            - MANUAL
          description: Kontrol demo untuk payment result.
    CreateOrderItem:
      type: object
      required:
        - product_id
        - quantity
      properties:
        product_id:
          type: string
        quantity:
          type: number
          format: decimal
          minimum: 0.01
    CustomerSnapshot:
      type: object
      required:
        - name
        - phone
      properties:
        name:
          type: string
        phone:
          type: string
        address:
          type: string
    OrderResponse:
      type: object
      required:
        - success
        - data
        - meta
      properties:
        success:
          type: boolean
          enum:
            - true
        data:
          $ref: '#/components/schemas/Order'
        meta:
          $ref: '#/components/schemas/ResponseMeta'
    OrderListResponse:
      type: object
      required:
        - success
        - data
        - pagination
        - meta
      properties:
        success:
          type: boolean
          enum:
            - true
        data:
          type: array
          items:
            $ref: '#/components/schemas/OrderSummary'
        pagination:
          $ref: '#/components/schemas/Pagination'
        meta:
          $ref: '#/components/schemas/ResponseMeta'
    ProductResponse:
      type: object
      required:
        - success
        - data
        - meta
      properties:
        success:
          type: boolean
          enum:
            - true
        data:
          $ref: '#/components/schemas/Product'
        meta:
          $ref: '#/components/schemas/ResponseMeta'
    ProductListResponse:
      type: object
      required:
        - success
        - data
        - pagination
        - meta
      properties:
        success:
          type: boolean
          enum:
            - true
        data:
          type: array
          items:
            $ref: '#/components/schemas/Product'
        pagination:
          $ref: '#/components/schemas/Pagination'
        meta:
          $ref: '#/components/schemas/ResponseMeta'
    OrderSummary:
      type: object
      required:
        - id
        - status
        - total_amount
        - created_at
      properties:
        id:
          type: string
        status:
          $ref: '#/components/schemas/OrderStatus'
        total_amount:
          type: integer
          format: int64
        created_at:
          type: string
          format: date-time
    Order:
      type: object
      required:
        - id
        - status
        - items
        - total_amount
        - created_at
      properties:
        id:
          type: string
        status:
          $ref: '#/components/schemas/OrderStatus'
        customer:
          $ref: '#/components/schemas/CustomerSnapshot'
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'
        total_amount:
          type: integer
          format: int64
        payment_id:
          type: string
          nullable: true
        correlation_id:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    OrderItem:
      type: object
      required:
        - product_id
        - product_name
        - unit
        - quantity
        - unit_price
        - line_total
      properties:
        id:
          type: string
        product_id:
          type: string
        product_name:
          type: string
        unit:
          type: string
        quantity:
          type: number
          format: decimal
        unit_price:
          type: integer
          format: int64
        line_total:
          type: integer
          format: int64
    OrderStatus:
      type: string
      enum:
        - PENDING
        - STOCK_RESERVED
        - WAITING_PAYMENT
        - CONFIRMED
        - CANCELLED
        - REJECTED
    Product:
      type: object
      required:
        - id
        - name
        - category
        - unit
        - price
        - available_qty
      properties:
        id:
          type: string
        name:
          type: string
        category:
          type: string
        unit:
          type: string
          example: sak
        price:
          type: integer
          format: int64
        available_qty:
          type: number
          format: decimal
        weight_kg:
          type: number
          format: decimal
        requires_truck:
          type: boolean
