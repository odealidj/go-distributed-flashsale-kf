# Definisi Finite State Machine (FSM)
# Berguna bagi engineer untuk memahami validasi update state.

state_machines:
  order_fsm:
    name: Order State Machine
    initial_state: PENDING
    terminal_states: [PAID, CANCELLED]
    transitions:
      - from: PENDING
        to: PAID
        trigger: PaymentCompletedEvent
        description: "Pembayaran berhasil diproses oleh Payment Service."

      - from: PENDING
        to: CANCELLED
        trigger: PaymentFailedEvent / PaymentTimeout
        description: "Pembayaran gagal atau batas waktu berakhir tanpa pembayaran yang dikonfirmasi."

  inventory_fsm:
    name: Inventory Item State Machine (Logical)
    initial_state: AVAILABLE
    transitions:
      - from: AVAILABLE
        to: RESERVED
        trigger: ReserveStockCommand
        description: "User menekan beli, Redis memotong stok dan DB mengunci (soft lock)."

      - from: RESERVED
        to: DEDUCTED
        trigger: PaymentCompletedEvent
        description: "Pembayaran berhasil, barang resmi terjual (hard lock)."

      - from: RESERVED
        to: AVAILABLE
        trigger: OrderCancelledEvent
        description: "Compensation. Pembayaran gagal/timeout, stok dikembalikan ke etalase."
