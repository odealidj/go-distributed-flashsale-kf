version: '3.8'

services:
  # ----------------------------------------------------
  # 1. DATABASE (POSTGRESQL)
  # ----------------------------------------------------
  postgres:
    image: docker.io/postgres:${POSTGRES_VERSION:-15-alpine}
    container_name: flashsale-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-root}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rootpassword}
      POSTGRES_DB: ${POSTGRES_DB:-flashsale_master}
    ports:
      # Di laptop, ini akan dibind ke port non-standar lokal (misal: 15432)
      - "${DB_HOST_BIND:-127.0.0.1}:${DB_PORT:-15432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-dbs.sh:/docker-entrypoint-initdb.d/init-dbs.sh
    networks:
      - flashsale_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-root} -d ${POSTGRES_DB:-flashsale_master}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------
  # 2. CACHE & ATOMIC COUNTER (REDIS)
  # ----------------------------------------------------
  redis:
    image: docker.io/redis:${REDIS_VERSION:-7-alpine}
    container_name: flashsale-redis
    ports:
      # Di laptop, ini akan dibind ke port non-standar lokal (misal: 16379)
      - "${REDIS_HOST_BIND:-127.0.0.1}:${REDIS_PORT:-16379}:6379"
    networks:
      - flashsale_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ----------------------------------------------------
  # 3. MESSAGE BROKER (KAFKA - KRaft Mode)
  # ----------------------------------------------------
  kafka:
    image: docker.io/bitnamilegacy/kafka:${KAFKA_VERSION:-3.5.1}
    container_name: flashsale-kafka
    environment:
      - KAFKA_ENABLE_KRAFT=yes
      - KAFKA_CFG_PROCESS_ROLES=broker,controller
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092,EXTERNAL://${KAFKA_PUBLIC_IP_OR_HOST:-localhost}:${KAFKA_EXTERNAL_PORT:-19094}
      - KAFKA_BROKER_ID=1
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - ALLOW_PLAINTEXT_LISTENER=yes
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true
    ports:
      # Internal network port terekspos ke host di port non-standar
      - "${KAFKA_PORT:-19092}:9092"
      - "${KAFKA_HOST_BIND:-127.0.0.1}:${KAFKA_EXTERNAL_PORT:-19094}:9094"
    networks:
      - flashsale_net
    volumes:
      - kafkadata:/bitnami/kafka

  # ----------------------------------------------------
  # 4. KAFKA UI (PROVE)
  # ----------------------------------------------------
  kafka-ui:
    image: docker.io/provectuslabs/kafka-ui:latest
    container_name: flashsale-kafka-ui
    depends_on:
      - kafka
    environment:
      - KAFKA_CLUSTERS_0_NAME=local
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092
    ports:
      - "${KAFKA_UI_PORT:-18080}:8080"
    networks:
      - flashsale_net

  # ----------------------------------------------------
  # 5. OBSERVABILITY (JAEGER)
  # ----------------------------------------------------
  jaeger:
    image: docker.io/jaegertracing/all-in-one:${JAEGER_VERSION:-latest}
    container_name: flashsale-jaeger
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "${JAEGER_HOST_BIND:-127.0.0.1}:${JAEGER_UI_PORT:-16686}:16686"         # UI
      - "${JAEGER_HOST_BIND:-127.0.0.1}:${JAEGER_OTLP_GRPC_PORT:-14317}:4317"   # OTLP gRPC
      - "${JAEGER_HOST_BIND:-127.0.0.1}:${JAEGER_OTLP_HTTP_PORT:-14318}:4318"   # OTLP HTTP
    networks:
      - flashsale_net

  # ----------------------------------------------------
  # 6. REVERSE PROXY / API GATEWAY FRONTEND (NGINX)
  # ----------------------------------------------------
  nginx:
    image: docker.io/nginx:${NGINX_VERSION:-alpine}
    container_name: flashsale-nginx
    ports:
      - "${NGINX_HOST_BIND:-127.0.0.1}:${NGINX_PORT:-18081}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - flashsale_net

  # ----------------------------------------------------
  # 7. GO SERVICES (API GATEWAY & BACKENDS)
  # ----------------------------------------------------
  api-gateway:
    build:
      context: .
      dockerfile: ./api-gateway/Dockerfile
    container_name: flashsale-api-gateway
    profiles: ["app"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    ports:
      - "${API_GATEWAY_PORT:-18000}:8000"
    environment:
      - APP_ENV=development
      - API_GATEWAY_PORT=8000
      - PRODUCT_SERVICE_ENDPOINT=product-service:9001
      - INVENTORY_SERVICE_ENDPOINT=inventory-service:9002
      - PAYMENT_SERVICE_ENDPOINT=payment-service:9003
      - JAEGER_HOST=jaeger
      - JAEGER_OTLP_GRPC_PORT=4317
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
    networks:
      - flashsale_net

  product-service:
    build:
      context: .
      dockerfile: ./product-service/Dockerfile
    container_name: flashsale-product-service
    profiles: ["app"]
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${PRODUCT_SERVICE_PORT:-19001}:9001"
    environment:
      - APP_ENV=development
      - DB_HOST=postgres
      - DB_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-root}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-rootpassword}
      - POSTGRES_DB=db_product
      - DATABASE_URL=postgres://${POSTGRES_USER:-root}:${POSTGRES_PASSWORD:-rootpassword}@postgres:5432/db_product?sslmode=disable
      - PRODUCT_SERVICE_PORT=9001
      - JAEGER_HOST=jaeger
      - JAEGER_OTLP_GRPC_PORT=4317
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
    networks:
      - flashsale_net

  inventory-service:
    build:
      context: .
      dockerfile: ./inventory-service/Dockerfile
    container_name: flashsale-inventory-service
    profiles: ["app"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    ports:
      - "${INVENTORY_SERVICE_PORT:-19002}:9002"
    environment:
      - APP_ENV=development
      - DB_HOST=postgres
      - DB_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-root}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-rootpassword}
      - POSTGRES_DB=db_inventory
      - DATABASE_URL=postgres://${POSTGRES_USER:-root}:${POSTGRES_PASSWORD:-rootpassword}@postgres:5432/db_inventory?sslmode=disable
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_ADDR=redis:6379
      - INVENTORY_SERVICE_PORT=9002
      - KAFKA_HOST=kafka
      - KAFKA_EXTERNAL_PORT=9092
      - KAFKA_BROKERS=kafka:9092
      - JAEGER_HOST=jaeger
      - JAEGER_OTLP_GRPC_PORT=4317
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
    networks:
      - flashsale_net

  order-service:
    build:
      context: .
      dockerfile: ./order-service/Dockerfile
    container_name: flashsale-order-service
    profiles: ["app"]
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      - APP_ENV=development
      - DB_HOST=postgres
      - DB_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-root}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-rootpassword}
      - POSTGRES_DB=db_order
      - DATABASE_URL=postgres://${POSTGRES_USER:-root}:${POSTGRES_PASSWORD:-rootpassword}@postgres:5432/db_order?sslmode=disable
      - KAFKA_HOST=kafka
      - KAFKA_EXTERNAL_PORT=9092
      - KAFKA_BROKERS=kafka:9092
      - JAEGER_HOST=jaeger
      - JAEGER_OTLP_GRPC_PORT=4317
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
    networks:
      - flashsale_net

  payment-service:
    build:
      context: .
      dockerfile: ./payment-service/Dockerfile
    container_name: flashsale-payment-service
    profiles: ["app"]
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    ports:
      - "${PAYMENT_SERVICE_PORT:-19003}:9003"
    environment:
      - APP_ENV=development
      - DB_HOST=postgres
      - DB_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-root}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-rootpassword}
      - POSTGRES_DB=db_payment
      - DATABASE_URL=postgres://${POSTGRES_USER:-root}:${POSTGRES_PASSWORD:-rootpassword}@postgres:5432/db_payment?sslmode=disable
      - PAYMENT_SERVICE_PORT=9003
      - KAFKA_HOST=kafka
      - KAFKA_EXTERNAL_PORT=9092
      - KAFKA_BROKERS=kafka:9092
      - JAEGER_HOST=jaeger
      - JAEGER_OTLP_GRPC_PORT=4317
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
    networks:
      - flashsale_net

volumes:
  pgdata:
  kafkadata:

networks:
  flashsale_net:
    driver: bridge
